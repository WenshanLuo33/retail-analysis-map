<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Grocery-Anchored Retail Research Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="app">
    <div id="map"></div>

    <aside id="sidebar">
      <div class="header">
        <h1>Retail Research Map</h1>
        <p>Grocery-anchored retail properties</p>
      </div>

      <div id="controls">
        <label>PROPERTY OWNER</label>
        <div id="ownerFilter" class="checkbox-group"></div>

        <label>TENANT</label>
        <input id="tenantSearch" placeholder="Trader Joe's" />

        <label>GLA</label>
        <div class="range-row">
          <input id="minGLA" type="number" placeholder="0" />
          <span>–</span>
          <input id="maxGLA" type="number" placeholder="100000" />
        </div>

        <label>GROCERY %</label>
        <div class="range-row">
          <input id="minGroceryPct" type="number" placeholder="20" />
          <span>–</span>
          <input id="maxGroceryPct" type="number" placeholder="50" />
        </div>

        <label>VACANCY %</label>
        <div class="range-row">
          <input id="minVacancyPct" type="number" placeholder="0" />
          <span>–</span>
          <input id="maxVacancyPct" type="number" placeholder="10" />
        </div>

        <div class="control-buttons">
          <button onclick="applyFilters()">FILTER</button>
          <button onclick="clearFilter()">CLEAR</button>
        </div>
      </div>

      <div id="project-detail" class="empty-state">
        Select a project on the map.
      </div>
    </aside>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
